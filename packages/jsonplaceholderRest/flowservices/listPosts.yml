kind: flowservice
id: jsonplaceholderRest.flows.listPosts
name: List All Posts from JSONPlaceholder
pipeline:
  - service:
      id: common.services.http.get
      input:
        url: https://jsonplaceholder.typicode.com/posts
        headers:
          Accept: application/json
    name: fetchPosts
  - map:
      mappings:
        - expression: "${steps.fetchPosts.body}"
          to: output.posts
