kind: rest_resource
id: jsonplaceholderRest.rest.posts
name: JSONPlaceholder Posts API

routes:
  - method: GET
    path: /posts
    flowservice: jsonplaceholderRest.flows.listPosts
    response:
      status: 200

  - method: POST
    path: /posts
    flowservice: jsonplaceholderRest.flows.createPost
    input:
      body: request.body
    response:
      status: 201

  - method: GET
    path: /posts/{id}
    flowservice: jsonplaceholderRest.flows.fetchPost
    input:
      id: request.path_params.id
    response:
      status: 200
