kind: rest_resource
id: test.rest.dataTransform
name: Test XML / CSV / Regex Services

routes:
  - method: POST
    path: /test/data-transform
    flowservice: test.features.testDataTransform
    input:
      csv_input: request.body.csv_input
      xml_input: request.body.xml_input
    response:
      status: 200
