kind: flowservice
id: test.features.testDataTransform
name: Test XML / CSV / Regex Services
input:
  csv_input:
    type: string
    required: false
  xml_input:
    type: string
    required: false
pipeline:

  # ── CSV ──────────────────────────────────────────────────────────────────
  # default value as a plain string (no ${} — YAML newlines are fine here)
  - set:
      path: vars.csvData
      value: "name,age,city\nAlice,30,Rome\nBob,25,Milan\nCarla,35,Naples"

  - if:
      condition: "${input.csv_input}"
      then:
        - set:
            path: vars.csvData
            value: "${input.csv_input}"

  - service:
      id: common.services.csv.parse
      input:
        value: "${vars.csvData}"
      output:
        value: vars.csvRows
        count: vars.csvCount
    name: csvParse

  - service:
      id: common.services.csv.serialize
      input:
        value: "${vars.csvRows}"
      output:
        value: vars.csvReserialized
    name: csvSerialize

  # ── XML ──────────────────────────────────────────────────────────────────
  - set:
      path: vars.xmlData
      value: "<catalog><book><title>Aurora Docs</title><author>Engine Team</author></book></catalog>"

  - if:
      condition: "${input.xml_input}"
      then:
        - set:
            path: vars.xmlData
            value: "${input.xml_input}"

  - service:
      id: common.services.xml.parse
      input:
        value: "${vars.xmlData}"
      output:
        value: vars.xmlParsed
    name: xmlParse

  - service:
      id: common.services.xml.serialize
      input:
        value: "${vars.xmlParsed}"
        root: document
      output:
        value: vars.xmlReserialized
    name: xmlSerialize

  # ── Regex ─────────────────────────────────────────────────────────────────
  - service:
      id: common.services.regex.findAll
      input:
        pattern: '[A-Z][a-z]+'
        value: 'Alice and Bob went to Rome and Milan'
      output:
        value: vars.regexMatches
        count: vars.regexCount
    name: regexFindAll

  - service:
      id: common.services.regex.replace
      input:
        pattern: 'hello'
        replacement: 'ciao'
        value: 'hello world, hello aurora'
      output:
        value: vars.regexReplaced
    name: regexReplace

  # ── Output ────────────────────────────────────────────────────────────────
  - map:
      mappings:
        - from: vars.csvRows
          to: output.csvRows
        - from: vars.csvCount
          to: output.csvRowCount
        - from: vars.csvReserialized
          to: output.csvReserialized
        - from: vars.xmlParsed
          to: output.xmlParsed
        - from: vars.xmlReserialized
          to: output.xmlReserialized
        - from: vars.regexMatches
          to: output.regexMatches
        - from: vars.regexCount
          to: output.regexMatchCount
        - from: vars.regexReplaced
          to: output.regexReplaced
