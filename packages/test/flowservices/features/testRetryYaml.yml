kind: flowservice
id: test.features.testRetryYaml
name: Test Retry on pure-YAML flowservice
pipeline:

  # flakyYamlService throws on attempts 1 and 2, succeeds on 3.
  # The retry config here allows up to 3 attempts with 0.1s linear delay.
  - try:
      do:
        - flowservice:
            id: test.features.flakyYamlService
            output:
              attempt: output.succeededOnAttempt
              maxAttempts: output.maxAttempts
              status: output.innerStatus
          retry:
            max_attempts: 3
            delay_seconds: 0.1
            backoff: linear
        - set:
            path: output.status
            value: "retry succeeded"
      catch:
        - set:
            path: output.status
            value: "all retries exhausted"
        - map:
            mappings:
              - from: vars.error.message
                to: output.lastError
