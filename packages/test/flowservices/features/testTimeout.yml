kind: flowservice
id: test.features.testTimeout
name: Test Step Timeout
input:
  sleep_seconds:
    type: number
    required: false
  timeout_seconds:
    type: number
    required: false
pipeline:

  # wrap in try so we return a clean response even when timeout fires
  - try:
      do:
        - service:
            id: test.services.slow.sleep
            input:
              seconds: "${input.sleep_seconds or 2.0}"
            output:
              value: vars.sleepResult
          timeout_seconds: "${input.timeout_seconds or 0.3}"
        - set:
            path: output.result
            value: "completed within timeout"
      catch:
        - set:
            path: output.result
            value: "timed out as expected"
        - map:
            mappings:
              - from: vars.error.message
                to: output.errorMessage

  - map:
      mappings:
        - expression: "${input.sleep_seconds or 2.0}"
          to: output.sleepSeconds
        - expression: "${input.timeout_seconds or 0.3}"
          to: output.timeoutSeconds
