kind: flowservice
id: test.features.testParallel
name: Test Parallel Branches
pipeline:

  # two branches run concurrently:
  #   mathBranch  → add(42+58) then multiply(result*2)
  #   timeBranch  → now() then add 7 days
  - parallel:
      branches:
        - name: mathBranch
          do:
            - service:
                id: common.services.math.add
                input:
                  a: 42
                  b: 58
                output:
                  value: output.sum         # service returns {"value": ...}
            - service:
                id: common.services.math.multiply
                input:
                  a: "${output.sum}"
                  b: 2
                output:
                  value: output.product

        - name: timeBranch
          do:
            - service:
                id: common.services.datetime.now
                output:
                  value: output.now
            - service:
                id: common.services.datetime.add
                input:
                  value: "${output.now}"
                  days: 7
                output:
                  value: output.nowPlusWeek

  # steps.<branchName> = branch output dict; access with dot notation
  - map:
      mappings:
        - expression: "${steps.mathBranch.sum}"
          to: output.mathSum
        - expression: "${steps.mathBranch.product}"
          to: output.mathProduct
        - expression: "${steps.timeBranch.now}"
          to: output.currentTime
        - expression: "${steps.timeBranch.nowPlusWeek}"
          to: output.nextWeek
        - value: "both branches completed"
          to: output.status
