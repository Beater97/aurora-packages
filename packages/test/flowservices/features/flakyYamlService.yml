kind: flowservice
id: test.features.flakyYamlService
name: Flaky YAML-only service (fails first 2 attempts)
pipeline:

  # meta.attempt = 1-based attempt number injected by the retry engine.
  # Throws on attempts 1 and 2, succeeds on attempt 3+.
  - if:
      condition: "${meta.attempt < 3}"
      then:
        - throw:
            code: TRANSIENT_ERROR
            message: "Transient failure on attempt ${meta.attempt} of ${meta.maxAttempts}"

  - map:
      mappings:
        - expression: "${meta.attempt}"
          to: output.attempt
        - expression: "${meta.maxAttempts}"
          to: output.maxAttempts
        - value: "succeeded"
          to: output.status
