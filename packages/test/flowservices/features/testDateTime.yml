kind: flowservice
id: test.features.testDateTime
name: Test DateTime Services
pipeline:

  # 1. current UTC time
  - service:
      id: common.services.datetime.now
      output:
        value: vars.now

  # 2. add 30 days
  - service:
      id: common.services.datetime.add
      input:
        value: "${vars.now}"
        days: 30
      output:
        value: vars.inThirtyDays

  # 3. diff between now and +30 days
  - service:
      id: common.services.datetime.diff
      input:
        from: "${vars.now}"
        to: "${vars.inThirtyDays}"
        unit: days
      output:
        value: vars.diffDays
        unit: vars.diffUnit

  # 4. format now
  - service:
      id: common.services.datetime.format
      input:
        value: "${vars.now}"
        format: "%d/%m/%Y %H:%M"
      output:
        value: vars.formatted

  # 5. unix timestamp and back
  - service:
      id: common.services.datetime.toTimestamp
      input:
        value: "${vars.now}"
      output:
        value: vars.unixTs

  - service:
      id: common.services.datetime.fromTimestamp
      input:
        value: "${vars.unixTs}"
      output:
        value: vars.fromTs

  # build output
  - map:
      mappings:
        - from: vars.now
          to: output.now
        - from: vars.inThirtyDays
          to: output.inThirtyDays
        - from: vars.diffDays
          to: output.diffDays
        - from: vars.formatted
          to: output.formatted
        - from: vars.unixTs
          to: output.unixTimestamp
        - from: vars.fromTs
          to: output.fromTimestamp
