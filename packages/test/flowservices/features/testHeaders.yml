kind: flowservice
id: test.features.testHeaders
name: Test Response Headers
pipeline:

  - service:
      id: common.services.datetime.now
      output:
        value: vars.now

  - map:
      mappings:
        - expression: "${meta.correlationId}"
          to: output.correlationId
        - from: vars.now
          to: output.generatedAt
        - value: "response headers test"
          to: output.message
