kind: flowservice
id: test.db.getUser
name: Get User by ID
input:
  id:
    type: integer
    required: true
output:
  user:
    type: object
pipeline:

  - service:
      id: common.services.database.queryOne
      input:
        db_alias: "main_db"
        sql: "SELECT id, name, email, created_at FROM users WHERE id = :id"
        params:
          id: "${input.id}"
      output:
        row: vars.row
        found: vars.found
    name: dbGet

  - if:
      condition: "${not vars.found}"
      then:
        - throw:
            code: "NOT_FOUND"
            message: "Utente non trovato"
            status_code: 404

  - map:
      mappings:
        - from: vars.row
          to: output.user
