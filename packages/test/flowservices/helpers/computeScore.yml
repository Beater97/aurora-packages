kind: flowservice
id: test.helpers.computeScore
name: Compute Score
version: 1.0.0
input:
  firstName:
    type: string
    required: true
  age:
    type: number
    required: true
output:
  score:
    type: number
    required: true
  label:
    type: string
    required: true
pipeline:
  - map:
      mappings:
        - expression: "${input.age * 2 + len(input.firstName)}"
          to: output.score
        - expression: "${'high' if input.age > 20 else 'low'}"
          to: output.label
