kind: flowservice
id: test.main.testAll
name: Test All Engine Features
version: 1.0.0
input:
  body:
    type: object
    ref: test.entity.testInput.TestAllInput
    required: true
output:
  summary:
    type: object
    required: true
pipeline:

  # ─── 1. MAP: from / value / expression ───────────────────────────────────
  - map:
      mappings:
        - from: input.body.firstName
          to: vars.rawName
        - value: "engine-test"
          to: vars.source
        - expression: "${input.body.age * 2}"
          to: vars.doubledAge

  # ─── 2. SERVICE: chiama python service test.services.math.add ────────────
  - service:
      id: test.services.math.add
      input:
        a: "${input.body.age}"
        b: 100
      output:
        result: vars.scoredAge
    name: mathAdd

  # ─── 3. MAP con transformer semplice (stringa): uppercase di firstName ───
  - map:
      mappings:
        - from: input.body.firstName
          transformer: common.services.strings.toUpperCase
          to: vars.upperName

  # ─── 4. MAP con transformer esteso (dict): input/output multipli ─────────
  - map:
      mappings:
        - transformer:
            id: test.helpers.computeScore
            input:
              firstName: "${input.body.firstName}"
              age: "${input.body.age}"
            output:
              score: vars.score
              label: vars.scoreLabel

  # ─── 5. SET: assegna un valore literal ───────────────────────────────────
  - set:
      path: vars.engineMeta
      value: "aurora-v1"

  # ─── 6. FLOWSERVICE: chiama computeScore e traccia in steps ─────────────
  - flowservice:
      id: test.helpers.computeScore
      input:
        firstName: "${input.body.firstName}"
        age: "${input.body.age}"
      output:
        score: vars.flowScore
        label: vars.flowLabel
    name: scoreStep

  # ─── 7. IF: branch condizionale su age ───────────────────────────────────
  - if:
      condition: "${input.body.age > 20}"
      then:
        - set:
            path: vars.ageGroup
            value: "adult"
      else:
        - set:
            path: vars.ageGroup
            value: "young"

  # ─── 8. SWITCH: multi-case su category ───────────────────────────────────
  - switch:
      value: "${input.body.category}"
      cases:
        - when: "premium"
          do:
            - set:
                path: vars.level
                value: "gold"
        - when: "basic"
          do:
            - set:
                path: vars.level
                value: "silver"
      default:
        - set:
            path: vars.level
            value: "bronze"

  # ─── 9. LOOP: itera su items, uppercase di ciascuno ─────────────────────
  - set:
      path: vars.processedItems
      value: []

  - loop:
      items: "${input.body.items}"
      item: currentItem
      index: idx
      do:
        - service:
            id: common.services.strings.toUpperCase
            input:
              value: "${vars.currentItem}"
            output:
              value: vars.upperItem
        - set:
            path: vars.processedItems
            value: "${list(vars.processedItems) + [vars.upperItem]}"

  # ─── 10. TRY / CATCH / FINALLY: gestione errori ─────────────────────────
  - try:
      do:
        - if:
            condition: "${input.body.failOnPurpose}"
            then:
              - throw:
                  code: "TEST_ERROR"
                  message: "Intentional test error triggered by failOnPurpose"
                  payload:
                    reason: "failOnPurpose was true"
        - set:
            path: vars.tryResult
            value: "success"
      catch:
        - set:
            path: vars.tryResult
            value: "caught"
        - map:
            mappings:
              - from: vars.error.message
                to: vars.caughtMessage
      finally:
        - set:
            path: vars.finallyRan
            value: true

  # ─── 11. CLEAR_PIPELINE: rimuove var temporanee ──────────────────────────
  - clear_pipeline:
      paths:
        - vars.rawName
        - vars.engineMeta

  # ─── 12. MAP finale: costruisce output.summary ───────────────────────────
  - map:
      mappings:
        - from: vars.source
          to: output.summary.source
        - from: vars.upperName
          to: output.summary.upperName
        - from: vars.doubledAge
          to: output.summary.doubledAge
        - from: vars.scoredAge
          to: output.summary.scoredAge
        - from: vars.score
          to: output.summary.transformerExtendedScore
        - from: vars.scoreLabel
          to: output.summary.transformerExtendedLabel
        - from: vars.ageGroup
          to: output.summary.ageGroup
        - from: vars.level
          to: output.summary.level
        - from: vars.processedItems
          to: output.summary.processedItems
        - from: vars.tryResult
          to: output.summary.tryResult
        - from: vars.caughtMessage
          to: output.summary.caughtMessage
        - from: vars.finallyRan
          to: output.summary.finallyRan
        - from: steps.scoreStep.score
          to: output.summary.flowserviceScore
        - from: steps.mathAdd.result
          to: output.summary.pythonServiceResult

  # ─── 13. RETURN: ritorno esplicito ───────────────────────────────────────
  - return:
      value: "${output}"
